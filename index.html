<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สต็อกการ์ดออนไลน์</title>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(to bottom, #0f172a, #1e3a8a);
  color: #fff;
}

.container {
  max-width: 1100px;
  width: 95%;
  margin: 20px auto;
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

h1 {
  text-align: center;
  color: #93c5fd;
  font-size: 48px; /* เดิม 96 */
  margin-bottom: 10px;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 10px;
  background: #2563eb;
  color: white;
  font-size: 24px; /* เดิม 54 */
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #1e40af;
}

#qr-result {
  margin-top: 10px;
  font-size: 28px; /* เดิม 58 */
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: #ffffff;
  color: #000;
  border-radius: 8px;
  overflow: hidden;
}

th, td {
  padding: 12px; /* เดิม 24 */
  border: 1px solid #ddd;
  font-size: 22px; /* เดิม 48 */
}

th {
  background-color: #2563eb;
  color: white;
  text-align: center;
}

td:first-child {
  width: 60%;
}

select, input, textarea {
  width: 100%;
  padding: 8px; /* เดิม 16 */
  border-radius: 6px;
  border: 1px solid #64748b;
  font-size: 20px; /* เดิม 48 */
  background: #334155;
  color: #fff;
  box-sizing: border-box;
}

.form-group {
  margin-top: 15px;
}

.form-group label {
  font-size: 22px; /* เดิม 48 */
  font-weight: bold;
}

.loading-message {
  font-size: 18px; /* เดิม 36 */
  color: #f59e0b;
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>สต็อก มะขาม</h1>

<button onclick="scanQRCode()">สแกน QR Code</button>

<div id="qr-result"></div>

<table>
<thead>
<tr><th>เลือกรายการ</th><th>จำนวน</th></tr>
</thead>
<tbody>
<tr>
<td><select id="item-select"></select></td>
<td><input type="number" id="quantity" placeholder="จำนวน" min="1"></td>
</tr>
</tbody>
</table>

<table id="items-table">
<thead>
<tr><th>รายการ</th><th>เหลือ</th><th>เบิก</th></tr>
</thead>
<tbody id="items"></tbody>
</table>

<div class="form-group">
<label>หมายเหตุ</label>
<textarea id="note" rows="2"></textarea>
</div>

<div class="loading-message" id="loading-message">
กำลังบันทึกข้อมูล...
</div>

<button onclick="submitRequest()">บันทึก</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwckPFHHRMDkQc6NNVNx7WzLwy3KI_xaqyWLezLiusVKliVJ100sew5TPc7gR8GnW2wDg/exec";

async function fetchItems() {
  const res = await fetch(API + "?action=getDropdown");
  const items = await res.json();

  const select = document.getElementById("item-select");
  select.innerHTML = "";

  items.forEach(item => {
    const option = document.createElement("option");
    option.value = item;
    option.textContent = item;
    select.appendChild(option);
  });
}

async function getItemByQR(qrCode) {
  const res = await fetch(API + "?action=getByQR&qr=" + qrCode);
  const items = await res.json();
  renderItems(items);
}

function renderItems(items) {
  const tbody = document.getElementById("items");
  tbody.innerHTML = "";

  items.forEach(item => {
    tbody.innerHTML += `
      <tr>
        <td>${item.name || 'ไม่มีข้อมูล'}</td>
        <td>${item.stock || 0}</td>
        <td><input type="number" min="0" /></td>
      </tr>`;
  });
}

function scanQRCode() {
  const qrReader = new Html5Qrcode("qr-result");

  qrReader.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 200 },
    decodedText => {
      qrReader.stop();
      document.getElementById("qr-result").innerText =
        "หมายเลขชั้นจัดเก็บ: " + decodedText;
      getItemByQR(decodedText);
    }
  );
}

async function submitRequest() {

  document.getElementById("loading-message").style.display = "block";

  const qrCode = document.getElementById("qr-result")
    .innerText.replace("หมายเลขชั้นจัดเก็บ: ", "").trim();

  const note = document.getElementById("note").value;
  const timestamp = new Date().toISOString();
  const rows = document.querySelectorAll("#items-table tbody tr");

  let data = [];

  const selectedItem = document.getElementById("item-select").value;
  const selectedQuantity = Number(document.getElementById("quantity").value);

  if (selectedItem && selectedQuantity > 0) {
    data.push({ timestamp, qrCode, item: selectedItem, quantity: selectedQuantity, note });
  }

  rows.forEach(row => {
    const item = row.cells[0].innerText;
    const quantity = Number(row.cells[2].querySelector("input").value) || 0;
    if (quantity > 0) {
      data.push({ timestamp, qrCode, item, quantity, note });
    }
  });

  if (data.length === 0) {
    alert("⚠️ กรุณาเลือกสินค้าหรือกรอกจำนวนก่อนบันทึก");
    document.getElementById("loading-message").style.display = "none";
    return;
  }

  await fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("✅ บันทึกข้อมูลสำเร็จ!");
  location.reload();
}

window.onload = fetchItems;

</script>

</body>
</html>
